<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mazey Game - An Elgar Game </title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#1a1a2e;color:#e0e0e0;font-family:'Segoe UI',sans-serif}

/* Desktop: lock to viewport, no body scroll */
@media(min-width:768px){
  body{height:100vh;overflow:hidden}
  #game-screen{height:100vh;overflow:hidden;display:flex;flex-direction:column}
}

/* ── PASSWORD ── */
#password-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:20px}
#password-screen h1{font-size:2.4rem;color:#FFD700;margin-bottom:8px;text-shadow:0 0 20px rgba(255,215,0,.4)}
#password-screen p{color:#8899cc;margin-bottom:32px}
.lock-icon{font-size:3rem;margin-bottom:16px}
#pw-input{padding:12px 20px;border-radius:10px;border:2px solid #4466aa;background:#0f0f1e;color:#fff;font-size:1rem;text-align:center;width:260px;margin-bottom:12px;outline:none}
#pw-input:focus{border-color:#FFD700}
#pw-go{padding:12px 32px;background:#FFD700;color:#2a1a00;border:none;border-radius:10px;font-size:1rem;font-weight:700;cursor:pointer}
#pw-go:hover{filter:brightness(1.08)}
#pw-error{color:#ff5555;font-size:.9rem;margin-top:10px;min-height:20px}

/* ── TOP BAR ── */
#top-bar{height:40px;background:#0f0f1e;border-bottom:1px solid #2a3050;display:flex;align-items:center;padding:0 12px;gap:10px;flex-shrink:0;overflow:hidden}
.tb-brand{color:#FFD700;font-size:13px;font-weight:500;white-space:nowrap}
.tb-sep{color:#2a3050;font-size:15px}
#tb-level{color:#e0e0e0;font-size:13px;font-weight:500;white-space:nowrap}
#tb-desc{color:#4a5a7a;font-size:11px;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#tb-coins{color:#FFD700;font-size:13px;font-weight:500;white-space:nowrap}
#tb-wearing{color:#8899cc;font-size:11px;white-space:nowrap}

/* ── MAIN AREA ── */
#main-area{flex:1;display:flex;overflow:hidden;min-height:0}

/* ── LEFT PANEL ── */
#left-panel{width:155px;min-width:155px;background:#0f1220;border-right:1px solid #2a3050;display:flex;flex-direction:column;padding:12px 10px 10px;gap:6px;overflow-y:auto;flex-shrink:0}
#avatar-canvas{display:block;border-radius:8px;border:1px solid #2a3050;align-self:center}
#lp-botname{font-size:13px;font-weight:500;color:#e0e0e0;text-align:center;margin-bottom:2px}
.lp-divider{border:none;border-top:1px solid #2a3050;margin:2px 0}
.lp-spacer{flex:1}
.lp-btn{display:flex;align-items:center;gap:6px;width:100%;padding:8px 10px;background:#1a2540;border:1px solid #2a3050;border-radius:6px;color:#8899cc;font-size:12px;cursor:pointer;text-align:left}
.lp-btn:hover{background:#1e2d50}
.lp-btn.shop{background:#9c27b0;border-color:#9c27b0;color:white}
.lp-btn.shop:hover{background:#7b1fa2}
.lp-btn.use{background:#00838f;border-color:#00838f;color:white}
.lp-btn.use:hover{background:#006070}
.lp-btn.reset{background:transparent;border-color:#1e2030;color:#334;font-size:11px}
.lp-select{width:100%;padding:8px;background:#1a2540;border:1px solid #2a3050;border-radius:6px;color:#8899cc;font-size:12px;cursor:pointer}
#legend-panel{display:flex;flex-wrap:wrap;gap:5px;padding:2px 0}
.leg-i{display:inline-flex;align-items:center;gap:3px;font-size:10px;color:#445}
.leg-d{width:8px;height:8px;border-radius:2px;flex-shrink:0}

/* ── MAZE COLUMN ── */
#maze-col{flex:1;display:flex;flex-direction:column;overflow:hidden;min-height:0;padding:4px 4px 0}
#maze-canvas{display:block;border:2px solid #334;border-radius:6px;flex-shrink:0}
#counter-strip{padding:4px 6px;font-size:12px;color:#8899cc;border-top:1px solid #1e2a3a;min-height:26px;flex-shrink:0}
#status-strip{padding:5px 6px;display:flex;align-items:center;gap:10px;min-height:38px;flex-shrink:0;flex-wrap:wrap}
#status{font-size:13px;color:#8899cc;flex:1}
#win-msg{font-size:15px;font-weight:500;color:#e0e0e0}
.act-btn{padding:7px 18px;background:#FFD700;color:#4a3a00;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer}
.act-btn:hover{filter:brightness(1.1)}

/* ── SHOP PANEL ── */
#shop-panel{display:none;border:2px solid #9c27b0;border-radius:10px;padding:14px;margin:10px 10px 10px 165px;background:#0f1220}
#shop-panel h3{margin:0 0 10px;color:#e0e0e0;font-size:15px}
#shop-msg{min-height:18px;font-size:13px;color:#4caf50;margin-bottom:8px;font-weight:600}
.si{display:flex;align-items:center;gap:10px;padding:8px 4px;border-top:1px solid #1e2a3a}
.si:first-of-type{border-top:none}
.sico{font-size:22px;min-width:30px}
.sinf{flex:1;text-align:left}
.snm{font-weight:500;font-size:13px;color:#e0e0e0}
.sds{font-size:11px;color:#8899cc}
.sact{display:flex;align-items:center;gap:6px;font-size:11px;color:#8899cc}
.ob{background:#4caf50;color:white;padding:2px 6px;border-radius:4px;font-size:10px}
.eb{background:#2196f3;color:white;padding:2px 6px;border-radius:4px;font-size:10px}
.sbtn{padding:5px 10px;background:#1a2540;border:1px solid #2a3050;border-radius:6px;color:#8899cc;font-size:12px;cursor:pointer}

/* ── MOBILE BAR (shop + consumables on mobile) ── */
#mobile-bar{display:none;padding:6px 10px;gap:6px;background:#0f0f1e;border-top:1px solid #2a3050;flex-wrap:wrap;align-items:center}
.mb-btn{padding:7px 12px;background:#1a2540;border:1px solid #2a3050;border-radius:6px;color:#8899cc;font-size:12px;cursor:pointer}
.mb-btn.shop{background:#9c27b0;border-color:#9c27b0;color:white}
.mb-btn.use{background:#00838f;border-color:#00838f;color:white}

/* ── MOBILE D-PAD ── */
#dpad{display:none;flex-direction:column;align-items:center;padding:10px 10px 14px;gap:3px;background:#0f0f1e;border-top:1px solid #2a3050}
.dpad-row{display:flex;gap:6px}
.dpad-btn{width:60px;height:60px;background:#1a2540;border:2px solid #2a3050;border-radius:12px;color:#8899cc;font-size:24px;display:flex;align-items:center;justify-content:center;cursor:pointer;user-select:none;-webkit-user-select:none;touch-action:manipulation}
.dpad-btn:active{background:#2a3550;transform:scale(.93)}
.dpad-gap{width:60px;height:60px}
#dpad-space{padding:9px 28px;background:#2a1050;border:2px solid #6a2aaa;border-radius:10px;color:#cc88ff;font-size:13px;margin-top:6px;cursor:pointer;user-select:none;touch-action:manipulation}
#dpad-space:active{background:#3a1a60}

/* ── MOBILE OVERRIDES ── */
@media(max-width:767px){
  #left-panel{display:none}
  #dpad{display:flex}
  #mobile-bar{display:flex}
  .tb-sep.hide-m,.tb-desc.hide-m{display:none}
  #shop-panel{margin:8px}
}
</style>
</head>
<body>

<!-- PASSWORD SCREEN -->
<div id="password-screen">
  <div class="lock-icon">🎮</div>
  <h1>Mazey Game</h1>
  <p>Enter the secret password to play!</p>
  <input type="password" id="pw-input" placeholder="Password..." maxlength="40"/>
  <button id="pw-go" onclick="checkPassword()">Let me in! 🚀</button>
  <div id="pw-error"></div>
</div>

<!-- GAME SCREEN -->
<div id="game-screen" style="display:none">

  <!-- Top bar -->
  <div id="top-bar">
    <span class="tb-brand">🎮 Mazey</span>
    <span class="tb-sep">·</span>
    <span id="tb-level">Level 1</span>
    <span class="tb-sep hide-m">·</span>
    <span id="tb-desc" class="hide-m">Find the gold star!</span>
    <span class="tb-sep">·</span>
    <span id="tb-coins">💰 0</span>
    <span class="tb-sep">·</span>
    <span id="tb-wearing"></span>
  </div>

  <!-- Main area: left panel + maze column -->
  <div id="main-area">

    <!-- Left panel -->
    <div id="left-panel">
      <canvas id="avatar-canvas" width="110" height="110"></canvas>
      <div id="lp-botname">Mr Brown</div>
      <hr class="lp-divider">
      <button class="lp-btn shop" id="shop-btn">🛒 Shop</button>
      <button class="lp-btn" id="restart-btn">↺ Restart</button>
      <select class="lp-select" id="level-jump"></select>
      <hr class="lp-divider">
      <button class="lp-btn use" id="use-boost" style="display:none">🚀 Booster</button>
      <button class="lp-btn use" id="use-food" style="display:none">🍎 Food</button>
      <div class="lp-spacer"></div>
      <hr class="lp-divider">
      <div id="legend-panel"></div>
      <button class="lp-btn reset" id="reset-btn">Reset all progress</button>
    </div>

    <!-- Maze column -->
    <div id="maze-col">
      <canvas id="maze-canvas" tabindex="0"></canvas>
      <div id="counter-strip">Coins: 0/3</div>
      <div id="status-strip">
        <span id="status">Use arrow keys to move</span>
        <span id="win-msg" style="display:none"></span>
        <button class="act-btn" id="next-btn" style="display:none">Next Level →</button>
        <button class="act-btn" id="home-btn" style="display:none" style="background:#1a2540;color:#8899cc">Play Again</button>
      </div>
    </div>
  </div>

  <!-- Mobile bar (shop + consumables) -->
  <div id="mobile-bar">
    <button class="mb-btn shop" id="m-shop-btn">🛒 Shop</button>
    <button class="mb-btn" id="m-restart-btn">↺ Restart</button>
    <button class="mb-btn use" id="m-use-boost" style="display:none">🚀 Booster</button>
    <button class="mb-btn use" id="m-use-food" style="display:none">🍎 Food</button>
    <select class="mb-btn" id="m-level-jump" style="background:#1a2540"></select>
  </div>

  <!-- D-pad (mobile only) -->
  <div id="dpad">
    <div class="dpad-row">
      <div class="dpad-gap"></div>
      <button class="dpad-btn" id="dpad-up">↑</button>
      <div class="dpad-gap"></div>
    </div>
    <div class="dpad-row">
      <button class="dpad-btn" id="dpad-left">←</button>
      <div class="dpad-gap" style="background:#1a2540;border-radius:8px;opacity:.3"></div>
      <button class="dpad-btn" id="dpad-right">→</button>
    </div>
    <div class="dpad-row">
      <div class="dpad-gap"></div>
      <button class="dpad-btn" id="dpad-down">↓</button>
      <div class="dpad-gap"></div>
    </div>
    <button id="dpad-space">✨ SPACE — magic hat teleport</button>
  </div>

  <!-- Shop panel -->
  <div id="shop-panel">
    <h3>🛒 Shop</h3>
    <div id="shop-msg"></div>
    <div id="shop-items"></div>
    <button class="sbtn" id="close-shop">Close Shop</button>
  </div>

</div>

<script>
// ══════════════════════════════════════════
//  PASSWORD
// ══════════════════════════════════════════
const CORRECT_PW = 'oisinmazeyclub';
function checkPassword(){
  const v=document.getElementById('pw-input').value.trim();
  if(v===CORRECT_PW){document.getElementById('password-screen').style.display='none';document.getElementById('game-screen').style.display='flex';initGame();}
  else{document.getElementById('pw-error').textContent='Oops! Wrong password. Try again!';document.getElementById('pw-input').value='';document.getElementById('pw-input').focus();}
}
document.addEventListener('DOMContentLoaded',()=>{
  document.getElementById('pw-input').addEventListener('keydown',e=>{if(e.key==='Enter')checkPassword();});
});

// ══════════════════════════════════════════
//  GAME
// ══════════════════════════════════════════
function initGame(){

const C=document.getElementById('maze-canvas');
const X=C.getContext('2d');
const AC=document.getElementById('avatar-canvas');
const AX=AC.getContext('2d');

// ── Canvas sizing ──
const TOPBAR_H=40, BOTTOM_H=72;
function getCanvasLimits(){
  const w=window.innerWidth,h=window.innerHeight;
  if(w<768)return{maxW:w-4,maxH:Math.min(h*.46,380)};
  return{maxW:w-155-12, maxH:h-TOPBAR_H-BOTTOM_H-8};
}

// ── localStorage ──
const LSP='mazey_progress',LSC='mazey_coins',LSI='mazey_inventory';
function lsGet(k,fb){try{const v=localStorage.getItem(k);return v!==null?JSON.parse(v):fb;}catch(e){return fb;}}
function lsSet(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}

// ── Game data ──
const BOTS={
  brown:{name:'Mr Brown',color:'#8B5A2B',face:'boring'},
  seeky:{name:'Seeky',color:'#FFD700',face:'cute',jet:true},
  obvious:{name:'Mr Obvious',color:'#dd2222',face:'obvious'},
  geoffrey:{name:'Geoffrey',color:'#F4C45A',face:'giraffe'},
  lighty:{name:'Mr Lighty',color:'#26A69A',face:'helmet'},
  axy:{name:'Axy',color:'#ffb3c6',face:'axolotl'}
};
const THEMES={
  def:{bg:'#1a1a2e',wall:'#4466aa',txt:'#8899cc'},
  nat:{bg:'#1a3a1a',wall:'#5a8c3a',txt:'#a8d090'},
  din:{bg:'#1a0d00',wall:'#7a5200',txt:'#d4961a'},
  und:{bg:'#001428',wall:'#005f8e',txt:'#40b4e5'}
};
const LEVELS=[
  {c:20,r:15,bot:'brown',desc:'Find the gold star!',feat:[],th:'def'},
  {c:24,r:18,bot:'geoffrey',desc:'Bigger maze, trickier paths!',feat:[],th:'def'},
  {c:22,r:16,bot:'obvious',desc:'Beware the trap doors!',feat:['traps'],th:'def'},
  {c:22,r:16,bot:'lighty',desc:'Find the cheese on your way!',feat:['cheese'],th:'def'},
  {c:22,r:16,bot:'seeky',desc:'Collect keys to open doors!',feat:['keys'],th:'def'},
  {c:22,r:16,bot:'brown',desc:'Dodge the octopus!',feat:['octopus'],th:'def'},
  {c:22,r:16,bot:'geoffrey',desc:'Find the rose in the forest!',feat:['rose'],th:'nat'},
  {c:24,r:18,bot:'axy',desc:'Axy collects 5 coins!',feat:['bigcoins'],th:'def'},
  {c:22,r:16,bot:'lighty',desc:'Collect all dino bones to open the gate!',feat:['dinos'],th:'din'},
  {c:22,r:16,bot:'seeky',desc:'Find treasure in the deep!',feat:['underwater'],th:'und'},
  {c:24,r:18,bot:'geoffrey',desc:'Tag all 3 chickens to open the gate!',feat:['chickens'],th:'def'}
];
const SHOP=[
  {id:'duck',name:'Duck Hat',icon:'🦆',price:4,type:'hat',desc:'Coins look like grapes — same value, more fun!'},
  {id:'guitar',name:'Guitar Hat',icon:'🎸',price:7,type:'hat',desc:'Every coin you collect counts double'},
  {id:'obsidian',name:'Obsidian Flame Hat',icon:'🔥',price:9,type:'hat',desc:'Trap doors cannot hurt you'},
  {id:'invisibility',name:'Invisibility Hat',icon:'👻',price:11,type:'hat',desc:'Octopus completely loses track of you'},
  {id:'zoomey',name:'Zoomey Hat',icon:'⚡',price:14,type:'hat',desc:'Move 3 squares per arrow press'},
  {id:'magic',name:'Magic Hat',icon:'🪄',price:18,type:'hat',desc:'Press SPACE then arrow to teleport 10 squares!'},
  {id:'booster',name:'Booster Rockets',icon:'🚀',price:5,type:'consumable',desc:'2 extra squares per press for 10 presses'},
  {id:'food',name:'Food',icon:'🍎',price:3,type:'consumable',desc:'Freezes the octopus for 6 seconds'}
];

// ── State ──
let hi=lsGet(LSP,0), coinBal=lsGet(LSC,0);
let inv={hats:[],boosters:0,food:0,equippedHat:null,...lsGet(LSI,{})};
let cur=Math.min(hi,LEVELS.length-1), won=false, playerPos, ld={};
let octIv=null, octTick=0, boostLeft=0, frozenUntil=0, teleMode=false;

function saveProg(l){if(l>hi){hi=l;lsSet(LSP,hi);refreshSel();}}
function saveCoins(){lsSet(LSC,coinBal);}
function saveInv(){lsSet(LSI,inv);}

// ── Maze ──
function buildMaze(cols,rows){
  const m=Array.from({length:rows},()=>Array.from({length:cols},()=>({r:true,d:true})));
  const v=Array.from({length:rows},()=>Array(cols).fill(false));
  const s=[[0,0]];v[0][0]=true;
  while(s.length){const [c,r]=s[s.length-1];const ds=[[1,0],[0,1],[-1,0],[0,-1]].sort(()=>Math.random()-.5);let mv=false;
    for(const [dc,dr] of ds){const nc=c+dc,nr=r+dr;if(nc>=0&&nc<cols&&nr>=0&&nr<rows&&!v[nr][nc]){if(dc===1)m[r][c].r=false;if(dc===-1)m[r][nc].r=false;if(dr===1)m[r][c].d=false;if(dr===-1)m[nr][c].d=false;v[nr][nc]=true;s.push([nc,nr]);mv=true;break;}}
    if(!mv)s.pop();}return m;}
function nbrs(maze,c,r,cols,rows){const n=[];if(c<cols-1&&!maze[r][c].r)n.push([c+1,r]);if(c>0&&!maze[r][c-1].r)n.push([c-1,r]);if(r<rows-1&&!maze[r][c].d)n.push([c,r+1]);if(r>0&&!maze[r-1][c].d)n.push([c,r-1]);return n;}
function bfs(maze,cols,rows,start,end){
  const q=[[start.c,start.r]],par={},key=(c,r)=>`${c},${r}`;par[key(start.c,start.r)]=null;
  while(q.length){const [c,r]=q.shift();if(c===end.c&&r===end.r){const path=[];let k=key(c,r);while(k){const [pc,pr]=k.split(',').map(Number);path.unshift({c:pc,r:pr});const p=par[k];k=p?key(p[0],p[1]):null;}return path;}
    for(const [nc,nr] of nbrs(maze,c,r,cols,rows)){const nk=key(nc,nr);if(!(nk in par)){par[nk]=[c,r];q.push([nc,nr]);}}}return null;}
function offPath(maze,cols,rows,ps){const o=[];for(let r=0;r<rows;r++)for(let c=0;c<cols;c++){const k=`${c},${r}`;if(!ps.has(k)&&!(c===0&&r===0)&&!(c===cols-1&&r===rows-1))o.push({c,r});}return o;}

// ── Octopus ──
function octNext(){const o=ld.octopus,moves=nbrs(ld.maze,o.c,o.r,ld.cols,ld.rows);if(!moves.length)return o;if(inv.equippedHat==='invisibility'||Math.random()<0.4){const f=moves.filter(([c,r])=>!(c===ld.octPrev.c&&r===ld.octPrev.r));const pool=f.length?f:moves,p=pool[Math.floor(Math.random()*pool.length)];return{c:p[0],r:p[1]};}const p=bfs(ld.maze,ld.cols,ld.rows,o,playerPos);return p&&p.length>1?p[1]:o;}
function stopOct(){if(octIv){clearInterval(octIv);octIv=null;}}
function startOct(){stopOct();octTick=0;octIv=setInterval(()=>{if(won)return;if(Date.now()<frozenUntil){drawAll();return;}octTick++;if(octTick%2!==0){drawAll();return;}const nx=octNext();ld.octPrev=ld.octopus;ld.octopus=nx;drawAll();if(nx.c===playerPos.c&&nx.r===playerPos.r){stopOct();ld.caught=true;setStatus('The octopus caught you! Try again.');drawAll();setTimeout(()=>{if(ld.caught)setupLevel();},1500);}},450);}

// ── Setup level ──
function setupLevel(){
  stopOct();boostLeft=0;frozenUntil=0;teleMode=false;
  const lv=LEVELS[cur];
  const{maxW,maxH}=getCanvasLimits();
  const t=Math.min(Math.floor(maxW/lv.c),Math.floor(maxH/lv.r));
  const maze=buildMaze(lv.c,lv.r);
  const path=bfs(maze,lv.c,lv.r,{c:0,r:0},{c:lv.c-1,r:lv.r-1});
  const ps=new Set(path.map(p=>`${p.c},${p.r}`));
  ld={cols:lv.c,rows:lv.r,tile:t,bot:lv.bot,feat:lv.feat,th:THEMES[lv.th]||THEMES.def,maze,path,ps,
      cheeseFound:false,cheeseBubble:false,roseFound:false,roseBubble:false,keysCol:[],doorsOpen:[],
      coinsCol:[],coins:[],showTrap:0,trapMsg:'',caught:false,
      bones:null,bonesCol:[],dinoWall:null,treasures:null,treasuresOpen:[],chickenPos:null,chickensTagged:0,chickenWall:null};
  C.width=lv.c*t;C.height=lv.r*t;
  const avoid=[];
  if(lv.feat.includes('traps')){const op=offPath(maze,lv.c,lv.r,ps).sort(()=>Math.random()-.5);ld.trapFinish=op[0]||path[Math.floor(path.length/3)];ld.trapStart=op[1]||path[Math.floor(2*path.length/3)];}
  if(lv.feat.includes('cheese')){const op=offPath(maze,lv.c,lv.r,ps);ld.cheese=op.length?op[Math.floor(Math.random()*op.length)]:path[Math.floor(path.length/2)];avoid.push(ld.cheese);}
  if(lv.feat.includes('rose')){ld.rose=path[Math.floor(path.length/2)];avoid.push(ld.rose);}
  if(lv.feat.includes('keys')){const pL=path.length;ld.key1=path[Math.floor(pL*.15)];ld.door1=path[Math.floor(pL*.35)];ld.key2=path[Math.floor(pL*.55)];ld.door2=path[Math.floor(pL*.78)];[ld.key1,ld.key2,ld.door1,ld.door2].forEach(x=>avoid.push(x));}
  if(lv.feat.includes('octopus')){const op=offPath(maze,lv.c,lv.r,ps).filter(c=>(Math.abs(c.c)+Math.abs(c.r))>=5);ld.octopus=(op.length?op:offPath(maze,lv.c,lv.r,ps))[Math.floor(Math.random()*Math.max(op.length,1))];ld.octPrev={...ld.octopus};}
  if(lv.feat.includes('dinos')){const wall=path[path.length-2];ld.dinoWall=wall;avoid.push(wall);const op=offPath(maze,lv.c,lv.r,ps).sort(()=>Math.random()-.5);const pm=path.slice(3,path.length-4).sort(()=>Math.random()-.5);const bones=[...op.slice(0,2)];for(const b of pm.slice(0,2))if(!bones.some(x=>x.c===b.c&&x.r===b.r))bones.push(b);ld.bones=bones.slice(0,4);ld.bonesCol=[];ld.bones.forEach(b=>avoid.push(b));}
  if(lv.feat.includes('underwater')){const op=offPath(maze,lv.c,lv.r,ps).sort(()=>Math.random()-.5);const pm=path.slice(Math.floor(path.length*.2),Math.floor(path.length*.8)).sort(()=>Math.random()-.5);const tres=[];if(op.length)tres.push(op[0]);if(pm.length)tres.push(pm[0]);if(op.length>1)tres.push(op[1]);ld.treasures=tres.slice(0,3);ld.treasuresOpen=[];ld.treasures.forEach(t=>avoid.push(t));}
  if(lv.feat.includes('chickens')){const wall=path[path.length-2];ld.chickenWall=wall;avoid.push(wall);const pL=path.length;ld.chickenPos=[path[Math.floor(pL*.25)],path[Math.floor(pL*.52)],path[Math.floor(pL*.78)]];ld.chickensTagged=0;ld.chickenPos.forEach(c=>avoid.push(c));}
  const isBig=lv.feat.includes('bigcoins'),count=isBig?5:3;
  const fracs=isBig?[.1,.28,.46,.64,.82]:[.2,.42,.65,.32,.55,.88];
  const cl=[];
  for(const f of fracs){if(cl.length>=count)break;const p=path[Math.floor(path.length*f)];const conflict=avoid.some(a=>a.c===p.c&&a.r===p.r)||cl.some(c=>c.c===p.c&&c.r===p.r)||(p.c===0&&p.r===0)||(p.c===lv.c-1&&p.r===lv.r-1);if(!conflict)cl.push(p);}
  ld.coins=cl;
  playerPos={c:0,r:0};won=false;
  document.getElementById('tb-level').textContent=`Level ${cur+1}`;
  document.getElementById('tb-desc').textContent=lv.desc;
  document.getElementById('lp-botname').textContent=BOTS[lv.bot].name;
  document.getElementById('win-msg').style.display='none';
  document.getElementById('next-btn').style.display='none';
  document.getElementById('home-btn').style.display='none';
  setStatus('Use arrow keys to move');
  updTopBar();updLegend();updCounter();updUse();refreshSel();drawAll();drawAvatar();
  if(lv.feat.includes('octopus'))setTimeout(startOct,1000);
}

  const cx=w/2,cy=h/2,bx=cx-s/2,by=cy-s/2;
  AX.fillStyle='#1a2540';AX.fillRect(0,0,w,h);
  if(b.face==='axolotl'){AX.fillStyle='#ffb3c6';AX.beginPath();AX.ellipse(cx,cy+s*.05,s*.42,s*.32,0,0,Math.PI*2);AX.fill();AX.fillStyle='#ff6b8a';[[-s*.35,-s*.2],[-s*.28,-s*.3],[s*.28,-s*.3],[s*.35,-s*.2]].forEach(([dx,dy])=>{AX.beginPath();AX.arc(cx+dx,cy+dy,s*.07,0,Math.PI*2);AX.fill();});AX.fillStyle='white';AX.beginPath();AX.arc(cx-s*.13,cy-s*.05,s*.09,0,Math.PI*2);AX.fill();AX.beginPath();AX.arc(cx+s*.13,cy-s*.05,s*.09,0,Math.PI*2);AX.fill();AX.fillStyle='#1a1a1a';AX.beginPath();AX.arc(cx-s*.12,cy-s*.05,s*.05,0,Math.PI*2);AX.fill();AX.beginPath();AX.arc(cx+s*.14,cy-s*.05,s*.05,0,Math.PI*2);AX.fill();AX.strokeStyle='#c2185b';AX.lineWidth=2;AX.beginPath();AX.arc(cx,cy+s*.1,s*.1,.1,Math.PI-.1);AX.stroke();}
  else if(b.face==='obvious'){AX.fillStyle='#dd2222';AX.fillRect(bx,by,s/2,s);AX.fillStyle='#2255dd';AX.fillRect(bx+s/2,by,s/2,s);}
  else if(b.face==='giraffe'){AX.fillStyle='#F4C45A';AX.fillRect(bx,by,s,s);AX.fillStyle='#8B4513';[{ox:.15,oy:.1,rx:.16,ry:.12},{ox:.6,oy:.08,rx:.13,ry:.16},{ox:.7,oy:.55,rx:.14,ry:.11},{ox:.15,oy:.6,rx:.13,ry:.16},{ox:.45,oy:.7,rx:.16,ry:.12}].forEach(sp=>{AX.beginPath();AX.ellipse(bx+sp.ox*s,by+sp.oy*s,sp.rx*s,sp.ry*s,0,0,Math.PI*2);AX.fill();});}
  else{AX.fillStyle=b.color;AX.fillRect(bx,by,s,s);}
  if(b.face==='helmet'){AX.fillStyle='#7B1FA2';AX.beginPath();AX.ellipse(cx,by+s*.32,s*.55,s*.45,0,0,Math.PI*2);AX.fill();AX.fillStyle='#FFD600';AX.fillRect(bx+s*.1,by+s*.3,s*.8,s*.25);AX.fillStyle='white';AX.beginPath();AX.arc(cx-s*.18,by+s*.42,s*.09,0,Math.PI*2);AX.fill();AX.beginPath();AX.arc(cx+s*.18,by+s*.42,s*.09,0,Math.PI*2);AX.fill();AX.fillStyle='#1a1a1a';AX.beginPath();AX.arc(cx-s*.17,by+s*.43,s*.05,0,Math.PI*2);AX.fill();AX.beginPath();AX.arc(cx+s*.19,by+s*.43,s*.05,0,Math.PI*2);AX.fill();}
  else if(b.face!=='axolotl'){const ey=by+s*.42;AX.fillStyle='white';AX.beginPath();AX.arc(cx-s*.2,ey,s*.13,0,Math.PI*2);AX.fill();AX.beginPath();AX.arc(cx+s*.2,ey,s*.13,0,Math.PI*2);AX.fill();AX.fillStyle='#1a1a1a';AX.beginPath();AX.arc(cx-s*.18,ey,s*.07,0,Math.PI*2);AX.fill();AX.beginPath();AX.arc(cx+s*.22,ey,s*.07,0,Math.PI*2);AX.fill();if(b.face==='boring'){AX.strokeStyle='#5a3010';AX.lineWidth=2;AX.beginPath();AX.moveTo(cx-s*.22,ey+s*.22);AX.lineTo(cx+s*.22,ey+s*.22);AX.stroke();}else if(b.face==='cute'){AX.strokeStyle='#b38a00';AX.lineWidth=2;AX.beginPath();AX.arc(cx,ey+s*.14,s*.18,.1,Math.PI-.1);AX.stroke();}else if(b.face==='obvious'){AX.strokeStyle='white';AX.lineWidth=2;AX.beginPath();AX.arc(cx,ey+s*.14,s*.18,.1,Math.PI-.1);AX.stroke();}else if(b.face==='giraffe'){AX.strokeStyle='#9a6408';AX.lineWidth=2;AX.beginPath();AX.arc(cx,ey+s*.14,s*.18,.1,Math.PI-.1);AX.stroke();AX.fillStyle='#8B4513';AX.fillRect(cx-s*.05,by-s*.08,s*.1,s*.15);AX.fillRect(cx+s*.25,by-s*.12,s*.1,s*.15);AX.beginPath();AX.arc(cx,by-s*.08,s*.07,0,Math.PI*2);AX.fill();AX.beginPath();AX.arc(cx+s*.3,by-s*.12,s*.07,0,Math.PI*2);AX.fill();}}
  // Hat preview on avatar
  const ha=inv.equippedHat;
  if(ha==='magic'){AX.fillStyle='#1a0050';AX.beginPath();AX.ellipse(cx,by-s*.04,s*.44,s*.1,0,0,Math.PI*2);AX.fill();AX.beginPath();AX.moveTo(cx-s*.3,by-s*.04);AX.lineTo(cx,by-s*.65);AX.lineTo(cx+s*.3,by-s*.04);AX.closePath();AX.fill();AX.fillStyle='#ffd700';AX.font=`${s*.18}px sans-serif`;AX.textAlign='center';AX.textBaseline='middle';AX.fillText('★',cx,by-s*.35);}
  else if(ha==='duck'){AX.fillStyle='#FFD700';AX.beginPath();AX.ellipse(cx-s*.05,by-s*.18,s*.2,s*.14,0,0,Math.PI*2);AX.fill();AX.beginPath();AX.ellipse(cx+s*.1,by-s*.3,s*.13,s*.12,.2,0,Math.PI*2);AX.fill();}
  else if(ha==='zoomey'){AX.fillStyle='#bbb';AX.beginPath();AX.ellipse(cx,by-s*.12,s*.44,s*.18,0,0,Math.PI*2);AX.fill();}
  else if(ha==='guitar'){AX.fillStyle='#2c1810';AX.fillRect(cx-s*.35,by-s*.02,s*.7,s*.06);AX.beginPath();AX.ellipse(cx,by-s*.12,s*.2,s*.12,0,0,Math.PI*2);AX.fill();}
  else if(ha==='obsidian'){AX.fillStyle='#1a0d2e';AX.beginPath();AX.ellipse(cx,by-s*.05,s*.4,s*.14,0,0,Math.PI*2);AX.fill();AX.fillRect(cx-s*.3,by-s*.05,s*.6,s*.1);AX.fillStyle='rgba(155,48,192,.9)';AX.beginPath();AX.moveTo(cx-s*.2,by-s*.05);AX.lineTo(cx,by-s*.5);AX.lineTo(cx+s*.2,by-s*.05);AX.closePath();AX.fill();}
}

// ── DRAW FUNCTIONS ──
function drawAll(){
  const{cols,rows,tile:t,th}=ld;
  X.fillStyle=th.bg;X.fillRect(0,0,C.width,C.height);
  if(ld.feat.includes('rose')){X.fillStyle='rgba(60,120,40,.15)';for(let i=0;i<30;i++){const x=(i*73+13)%C.width,y=(i*51+27)%C.height;X.beginPath();X.arc(x,y,8+(i%4)*2,0,Math.PI*2);X.fill();}}
  if(ld.feat.includes('dinos')){X.fillStyle='rgba(100,70,10,.12)';for(let i=0;i<20;i++){const x=(i*91+47)%C.width,y=(i*67+31)%C.height;X.beginPath();X.arc(x,y,12+(i%3)*6,0,Math.PI*2);X.fill();}}
  if(ld.feat.includes('underwater')){const now=Date.now()/2000;X.fillStyle='rgba(0,180,255,.1)';for(let i=0;i<15;i++){const x=(i*87+12)%C.width,y=(i*61+now*30)%C.height;X.beginPath();X.arc(x,y,3+(i%4)*2,0,Math.PI*2);X.fill();}}
  X.strokeStyle=th.wall;X.lineWidth=2;
  for(let r=0;r<rows;r++)for(let c=0;c<cols;c++){const x=c*t,y=r*t;if(r===0){X.beginPath();X.moveTo(x,y);X.lineTo(x+t,y);X.stroke();}if(c===0){X.beginPath();X.moveTo(x,y);X.lineTo(x,y+t);X.stroke();}if(ld.maze[r][c].r){X.beginPath();X.moveTo(x+t,y);X.lineTo(x+t,y+t);X.stroke();}if(ld.maze[r][c].d){X.beginPath();X.moveTo(x,y+t);X.lineTo(x+t,y+t);X.stroke();}}
  if(ld.feat.includes('traps')){dTrap(ld.trapFinish.c,ld.trapFinish.r);dTrap(ld.trapStart.c,ld.trapStart.r);}
  if(ld.feat.includes('cheese')&&!ld.cheeseFound)dCheese(ld.cheese.c,ld.cheese.r);
  if(ld.feat.includes('rose')&&!ld.roseFound)dRose(ld.rose.c,ld.rose.r);
  if(ld.feat.includes('keys')){if(!ld.keysCol.includes(1))dKey(ld.key1.c,ld.key1.r,'#00bcd4');if(!ld.keysCol.includes(2))dKey(ld.key2.c,ld.key2.r,'#ff6f00');if(!ld.doorsOpen.includes(1))dDoor(ld.door1.c,ld.door1.r,'#00bcd4');if(!ld.doorsOpen.includes(2))dDoor(ld.door2.c,ld.door2.r,'#ff6f00');}
  if(ld.bones)ld.bones.forEach((b,i)=>{if(!ld.bonesCol.includes(i))dBone(b.c,b.r);});
  if(ld.treasures)ld.treasures.forEach((tr,i)=>dTreasure(tr.c,tr.r,ld.treasuresOpen.includes(i)));
  if(ld.dinoWall&&ld.bonesCol.length<(ld.bones||[]).length)dDinoWall(ld.dinoWall.c,ld.dinoWall.r);
  if(ld.chickenPos&&ld.chickensTagged<3)dChicken(ld.chickenPos[ld.chickensTagged].c,ld.chickenPos[ld.chickensTagged].r);
  if(ld.chickenWall&&ld.chickensTagged<3)dChickenWall(ld.chickenWall.c,ld.chickenWall.r);
  ld.coins.forEach((coin,i)=>{if(!ld.coinsCol.includes(i)){inv.equippedHat==='duck'?dGrape(coin.c,coin.r):dCoin(coin.c,coin.r);}});
  const gx=(cols-1)*t+t/2,gy=(rows-1)*t+t/2;
  X.fillStyle='#FFD700';X.font=`bold ${t*.7}px sans-serif`;X.textAlign='center';X.textBaseline='middle';X.fillText('★',gx,gy);
  X.font='10px sans-serif';X.fillStyle=th.txt;X.textAlign='left';X.textBaseline='top';X.fillText('START',3,2);X.textAlign='right';X.fillText('GOAL',C.width-3,C.height-12);
  if(ld.feat.includes('octopus')&&ld.octopus)dOctopus(ld.octopus.c,ld.octopus.r);
  if(!won&&!ld.caught)drawBot(playerPos.c,playerPos.r);
  if(teleMode){const bx=playerPos.c*t+t/2,by=playerPos.r*t+t/2;X.fillStyle='#cc44ff';X.font=`${t*.35}px sans-serif`;X.textAlign='center';X.textBaseline='middle';for(let i=0;i<4;i++){const a=i*Math.PI/2+Date.now()/400;X.fillText('✦',bx+Math.cos(a)*t*.75,by+Math.sin(a)*t*.75);}X.fillStyle='rgba(180,0,255,.8)';X.beginPath();X.roundRect(C.width/2-95,8,190,22,5);X.fill();X.fillStyle='#fff';X.font='bold 12px sans-serif';X.textAlign='center';X.textBaseline='middle';X.fillText('✨ Teleport ready! Pick direction',C.width/2,20);}
  if(ld.cheeseBubble)dBubble(ld.cheese.c,ld.cheese.r,['"Thank you for finding me','in the hike and seek!"'],'#ff8f00');
  if(ld.roseBubble)dBubble(ld.rose.c,ld.rose.r,['"Thanks for finding me','in Hide and Seek!"'],'#e91e63');
  if(ld.showTrap>0)dTrapMsg();
  if(boostLeft>0){X.fillStyle='rgba(0,188,212,.85)';X.beginPath();X.roundRect(8,8,90,22,5);X.fill();X.fillStyle='#fff';X.font='bold 12px sans-serif';X.textAlign='left';X.textBaseline='middle';X.fillText(`🚀 Boost x${boostLeft}`,14,20);}
  if(Date.now()<frozenUntil){const l=Math.max(0,Math.ceil((frozenUntil-Date.now())/1000));X.fillStyle='rgba(33,150,243,.85)';X.beginPath();X.roundRect(C.width-100,8,92,22,5);X.fill();X.fillStyle='#fff';X.font='bold 12px sans-serif';X.textAlign='left';X.textBaseline='middle';X.fillText(`❄ Frozen ${l}s`,C.width-94,20);}
}

function dTrap(c,r){const t=ld.tile,x=c*t+t/2,y=r*t+t/2;X.fillStyle='#9c27b0';X.beginPath();X.arc(x,y,t*.32,0,Math.PI*2);X.fill();X.strokeStyle='#4a148c';X.lineWidth=2;X.stroke();X.fillStyle='#fff';X.font=`bold ${t*.4}px sans-serif`;X.textAlign='center';X.textBaseline='middle';X.fillText('?',x,y);}
function dCheese(c,r){const t=ld.tile,x=c*t+t/2,y=r*t+t/2,s=t*.6;X.fillStyle='#ffc107';X.beginPath();X.moveTo(x-s/2,y+s/3);X.lineTo(x+s/2,y+s/3);X.lineTo(x+s/3,y-s/3);X.lineTo(x-s/2,y+s/3);X.closePath();X.fill();X.strokeStyle='#ff8f00';X.lineWidth=1.5;X.stroke();X.fillStyle='#ff8f00';[[-s*.15,s*.1],[s*.05,s*.15],[s*.15,-s*.05]].forEach(([dx,dy])=>{X.beginPath();X.arc(x+dx,y+dy,t*.04,0,Math.PI*2);X.fill();});}
function dRose(c,r){const t=ld.tile,x=c*t+t/2,y=r*t+t/2;X.fillStyle='#2e7d32';X.fillRect(x-1,y,2,t*.3);X.fillStyle='#388e3c';X.beginPath();X.ellipse(x-t*.1,y+t*.18,t*.08,t*.05,-.5,0,Math.PI*2);X.fill();X.beginPath();X.ellipse(x+t*.1,y+t*.22,t*.08,t*.05,.5,0,Math.PI*2);X.fill();X.fillStyle='#c2185b';X.beginPath();X.arc(x,y-t*.05,t*.18,0,Math.PI*2);X.fill();X.fillStyle='#e91e63';[[-t*.06,-t*.08],[t*.06,-t*.06],[0,-t*.12]].forEach(([dx,dy])=>{X.beginPath();X.arc(x+dx,y+dy,t*.1,0,Math.PI*2);X.fill();});X.fillStyle='#f48fb1';X.beginPath();X.arc(x,y-t*.05,t*.05,0,Math.PI*2);X.fill();}
function dKey(c,r,col){const t=ld.tile,x=c*t+t/2,y=r*t+t/2;X.fillStyle=col;X.beginPath();X.arc(x-t*.15,y,t*.18,0,Math.PI*2);X.fill();X.fillStyle=ld.th.bg;X.beginPath();X.arc(x-t*.15,y,t*.07,0,Math.PI*2);X.fill();X.fillStyle=col;X.fillRect(x-t*.02,y-t*.05,t*.35,t*.1);X.fillRect(x+t*.2,y-t*.05,t*.06,t*.18);X.fillRect(x+t*.1,y-t*.05,t*.06,t*.14);}
function dDoor(c,r,col){const t=ld.tile,x=c*t,y=r*t;X.fillStyle='#795548';X.fillRect(x+t*.15,y+t*.15,t*.7,t*.7);X.strokeStyle=col;X.lineWidth=3;X.strokeRect(x+t*.15,y+t*.15,t*.7,t*.7);X.fillStyle=col;X.beginPath();X.arc(x+t*.7,y+t*.5,t*.05,0,Math.PI*2);X.fill();}
function dCoin(c,r){const t=ld.tile,x=c*t+t/2,y=r*t+t/2;X.fillStyle='#ffd700';X.beginPath();X.arc(x,y,t*.22,0,Math.PI*2);X.fill();X.strokeStyle='#b8860b';X.lineWidth=1.5;X.stroke();X.fillStyle='#b8860b';X.font=`bold ${t*.28}px sans-serif`;X.textAlign='center';X.textBaseline='middle';X.fillText('$',x,y);}

  if(b.jet){X.fillStyle='#888';X.fillRect(x+s/2-2,by+4,6,s*.55);X.fillStyle='#ff8c00';X.beginPath();X.ellipse(x+s/2+1,by+s*.6+4,3,5,0,0,Math.PI*2);X.fill();}
  if(b.face==='obvious'){X.fillStyle='#dd2222';X.fillRect(bx,by,s/2,s);X.fillStyle='#2255dd';X.fillRect(bx+s/2,by,s/2,s);}
  else if(b.face==='giraffe'){X.fillStyle='#F4C45A';X.fillRect(bx,by,s,s);X.fillStyle='#8B4513';[{ox:.15,oy:.1,rx:.16,ry:.12},{ox:.6,oy:.08,rx:.13,ry:.16},{ox:.7,oy:.55,rx:.14,ry:.11},{ox:.15,oy:.6,rx:.13,ry:.16},{ox:.45,oy:.7,rx:.16,ry:.12}].forEach(sp=>{X.beginPath();X.ellipse(bx+sp.ox*s,by+sp.oy*s,sp.rx*s,sp.ry*s,0,0,Math.PI*2);X.fill();});}
  else{X.fillStyle=b.color;X.fillRect(bx,by,s,s);}
  if(b.face==='helmet'){X.fillStyle='#7B1FA2';X.beginPath();X.ellipse(x,by+s*.32,s*.55,s*.45,0,0,Math.PI*2);X.fill();X.fillStyle='#FFD600';X.fillRect(bx+s*.1,by+s*.3,s*.8,s*.25);X.fillStyle='white';X.beginPath();X.arc(x-s*.18,by+s*.42,s*.09,0,Math.PI*2);X.fill();X.beginPath();X.arc(x+s*.18,by+s*.42,s*.09,0,Math.PI*2);X.fill();X.fillStyle='#1a1a1a';X.beginPath();X.arc(x-s*.17,by+s*.43,s*.05,0,Math.PI*2);X.fill();X.beginPath();X.arc(x+s*.19,by+s*.43,s*.05,0,Math.PI*2);X.fill();}
  else{const ey=by+s*.42;X.fillStyle='white';X.beginPath();X.arc(x-s*.2,ey,s*.13,0,Math.PI*2);X.fill();X.beginPath();X.arc(x+s*.2,ey,s*.13,0,Math.PI*2);X.fill();X.fillStyle='#1a1a1a';X.beginPath();X.arc(x-s*.18,ey,s*.07,0,Math.PI*2);X.fill();X.beginPath();X.arc(x+s*.22,ey,s*.07,0,Math.PI*2);X.fill();if(b.face==='boring'){X.strokeStyle='#5a3010';X.lineWidth=1.5;X.beginPath();X.moveTo(x-s*.22,ey+s*.22);X.lineTo(x+s*.22,ey+s*.22);X.stroke();}else if(b.face==='cute'){X.strokeStyle='#b38a00';X.lineWidth=1.5;X.beginPath();X.arc(x,ey+s*.14,s*.18,.1,Math.PI-.1);X.stroke();X.fillStyle='rgba(255,150,180,.55)';X.beginPath();X.ellipse(x-s*.35,ey+s*.12,s*.1,s*.06,0,0,Math.PI*2);X.fill();X.beginPath();X.ellipse(x+s*.35,ey+s*.12,s*.1,s*.06,0,0,Math.PI*2);X.fill();}else if(b.face==='obvious'){X.strokeStyle='white';X.lineWidth=1.5;X.beginPath();X.arc(x,ey+s*.14,s*.18,.1,Math.PI-.1);X.stroke();}else if(b.face==='giraffe'){X.strokeStyle='#9a6408';X.lineWidth=1.5;X.beginPath();X.arc(x,ey+s*.14,s*.18,.1,Math.PI-.1);X.stroke();X.fillStyle='#8B4513';X.fillRect(x-s*.05,by-s*.08,s*.1,s*.15);X.fillRect(x+s*.25,by-s*.12,s*.1,s*.15);X.beginPath();X.arc(x,by-s*.08,s*.07,0,Math.PI*2);X.fill();X.beginPath();X.arc(x+s*.3,by-s*.12,s*.07,0,Math.PI*2);X.fill();}}

// ── Game logic ──
function canMove(c,r,dc,dr){const nc=c+dc,nr=r+dr;if(nc<0||nc>=ld.cols||nr<0||nr>=ld.rows)return false;if(ld.dinoWall&&ld.bonesCol.length<(ld.bones||[]).length&&nc===ld.dinoWall.c&&nr===ld.dinoWall.r)return false;if(ld.chickenWall&&ld.chickensTagged<3&&nc===ld.chickenWall.c&&nr===ld.chickenWall.r)return false;if(dc===1)return !ld.maze[r][c].r;if(dc===-1)return c>0&&!ld.maze[r][c-1].r;if(dr===1)return !ld.maze[r][c].d;if(dr===-1)return r>0&&!ld.maze[r-1][c].d;return false;}

function processArrival(nc,nr){
  ld.coins.forEach((coin,i)=>{if(!ld.coinsCol.includes(i)&&nc===coin.c&&nr===coin.r){ld.coinsCol.push(i);const g=inv.equippedHat==='guitar'?2:1;coinBal+=g;saveCoins();setStatus(`+${g} coin${g>1?'s':''}! Total: ${coinBal}`);updTopBar();updCounter();}});
  if(ld.feat.includes('keys')){if(!ld.keysCol.includes(1)&&nc===ld.key1.c&&nr===ld.key1.r){ld.keysCol.push(1);setStatus('Got the blue key!');}if(!ld.keysCol.includes(2)&&nc===ld.key2.c&&nr===ld.key2.r){if(!ld.doorsOpen.includes(1))setStatus('Open the blue door first!');else{ld.keysCol.push(2);setStatus('Got the orange key!');}}}
  if(ld.bones){let got=false;ld.bones.forEach((b,i)=>{if(!ld.bonesCol.includes(i)&&nc===b.c&&nr===b.r){ld.bonesCol.push(i);got=true;}});if(got){updCounter();setStatus(ld.bonesCol.length>=ld.bones.length?'All bones found! Gate is open! 🎉':`Bone found! ${ld.bonesCol.length}/${ld.bones.length} 🦴`);}}
  if(ld.treasures){ld.treasures.forEach((tr,i)=>{if(!ld.treasuresOpen.includes(i)&&nc===tr.c&&nr===tr.r){ld.treasuresOpen.push(i);const g=inv.equippedHat==='guitar'?20:10;coinBal+=g;saveCoins();setStatus(`Treasure! +${g} coins! 💎`);updTopBar();updCounter();}});}
  if(ld.chickenPos&&ld.chickensTagged<3){const cp=ld.chickenPos[ld.chickensTagged];if(cp&&nc===cp.c&&nr===cp.r){ld.chickensTagged++;updCounter();setStatus(ld.chickensTagged>=3?'All chickens caught! Gate is open! 🐔':`Chicken ${ld.chickensTagged}/3 caught! 🐔`);}}
  if(ld.feat.includes('cheese')&&!ld.cheeseFound&&nc===ld.cheese.c&&nr===ld.cheese.r){ld.cheeseFound=true;ld.cheeseBubble=true;setStatus('You found the cheese!');drawAll();setTimeout(()=>{ld.cheeseBubble=false;drawAll();},3500);return true;}
  if(ld.feat.includes('rose')&&!ld.roseFound&&nc===ld.rose.c&&nr===ld.rose.r){ld.roseFound=true;ld.roseBubble=true;setStatus('You found the rose!');drawAll();setTimeout(()=>{ld.roseBubble=false;drawAll();},3500);return true;}
  if(ld.feat.includes('traps')){const onF=nc===ld.trapFinish.c&&nr===ld.trapFinish.r,onS=nc===ld.trapStart.c&&nr===ld.trapStart.r;if((onF||onS)&&inv.equippedHat==='obsidian'){setStatus('Obsidian flames burned the trap!');}else if(onF){playerPos={c:ld.cols-2,r:ld.rows-2};ld.trapMsg='Lucky! Warped near the goal!';ld.showTrap=1;drawAll();setTimeout(()=>{ld.showTrap=0;drawAll();},1800);return true;}else if(onS){playerPos={c:0,r:0};ld.trapMsg='Oh no! Back to the start!';ld.showTrap=1;drawAll();setTimeout(()=>{ld.showTrap=0;drawAll();},1800);return true;}}
  if(ld.feat.includes('octopus')&&ld.octopus&&nc===ld.octopus.c&&nr===ld.octopus.r&&Date.now()>=frozenUntil){stopOct();ld.caught=true;setStatus('The octopus caught you! Try again.');drawAll();setTimeout(()=>{if(ld.caught)setupLevel();},1500);return true;}
  return false;
}

function handleWin(){
  won=true;stopOct();teleMode=false;saveProg(cur+1);
  const nm=BOTS[ld.bot].name;
  const wm=document.getElementById('win-msg');
  wm.style.display='inline';
  if(cur<LEVELS.length-1){wm.textContent=`${nm} made it through Level ${cur+1}! 🎉`;document.getElementById('next-btn').style.display='inline-block';}
  else{wm.textContent=`You beat ALL ${LEVELS.length} levels! AMAZING! 🏆`;document.getElementById('home-btn').style.display='inline-block';}
  setStatus('');
}

function move(dc,dr){
  if(won||ld.caught)return;
  const nc=playerPos.c+dc,nr=playerPos.r+dr;
  if(!canMove(playerPos.c,playerPos.r,dc,dr))return;
  if(ld.feat.includes('keys')){if(!ld.doorsOpen.includes(1)&&nc===ld.door1.c&&nr===ld.door1.r){if(!ld.keysCol.includes(1)){setStatus('Locked! Find the blue key first.');return;}ld.doorsOpen.push(1);setStatus('Blue door opened!');}if(!ld.doorsOpen.includes(2)&&nc===ld.door2.c&&nr===ld.door2.r){if(!ld.doorsOpen.includes(1)){setStatus('Open the blue door first!');return;}if(!ld.keysCol.includes(2)){setStatus('Locked! Find the orange key first.');return;}ld.doorsOpen.push(2);setStatus('Both doors open!');}}
  playerPos={c:nc,r:nr};if(processArrival(nc,nr))return;drawAll();if(nc===ld.cols-1&&nr===ld.rows-1)handleWin();
}

function doTeleport(dc,dr){
  if(won||ld.caught){teleMode=false;return;}
  const tc=Math.max(0,Math.min(ld.cols-1,playerPos.c+dc*10)),tr=Math.max(0,Math.min(ld.rows-1,playerPos.r+dr*10));
  if(ld.dinoWall&&ld.bonesCol.length<(ld.bones||[]).length&&tc===ld.dinoWall.c&&tr===ld.dinoWall.r){setStatus("Can't teleport through the bone gate!");teleMode=false;drawAll();return;}
  if(ld.chickenWall&&ld.chickensTagged<3&&tc===ld.chickenWall.c&&tr===ld.chickenWall.r){setStatus("Can't teleport through the chicken gate!");teleMode=false;drawAll();return;}
  playerPos={c:tc,r:tr};teleMode=false;if(processArrival(tc,tr))return;drawAll();if(tc===ld.cols-1&&tr===ld.rows-1)handleWin();
}

function doMoveWithEffects(dc,dr){
  const base=inv.equippedHat==='zoomey'?3:1,extra=boostLeft>0?2:0;
  if(boostLeft>0)boostLeft--;const total=base+extra;
  move(dc,dr);for(let i=1;i<total;i++)setTimeout(()=>{if(!won&&!ld.caught)move(dc,dr);if(i===total-1)updUse();},i*80);
  if(total===1)updUse();
}
function doSpace(){if(inv.equippedHat==='magic'&&!won&&!ld.caught){teleMode=!teleMode;setStatus(teleMode?'✨ Teleport ready! Press a direction.':'Teleport cancelled.');drawAll();}}

// ── Shop ──
function renderShop(){
  const html=SHOP.map(item=>{
    let ac='';
    if(item.type==='hat'){if(inv.hats.includes(item.id)){const eq=inv.equippedHat===item.id;ac=`<button class="sbtn" onclick="toggleEquip('${item.id}')">${eq?'Unequip':'Equip'}</button><span class="${eq?'eb':'ob'}">${eq?'On':'Owned'}</span>`;}else{ac=`<button class="sbtn" ${coinBal>=item.price?'':'disabled'} onclick="buyItem('${item.id}')">Buy ${item.price}💰</button>`;}}
    else{const cnt=item.id==='booster'?inv.boosters:inv.food;ac=`<button class="sbtn" ${coinBal>=item.price?'':'disabled'} onclick="buyItem('${item.id}')">Buy ${item.price}💰</button>${cnt>0?`<span style="font-size:11px;color:#556"> ×${cnt}</span>`:''}`;} 
    return `<div class="si"><div class="sico">${item.icon}</div><div class="sinf"><div class="snm">${item.name}</div><div class="sds">${item.desc}</div></div><div class="sact">${ac}</div></div>`;
  }).join('');
  document.getElementById('shop-items').innerHTML=html;
}
window.buyItem=function(id){const item=SHOP.find(i=>i.id===id);if(!item)return;if(coinBal<item.price){document.getElementById('shop-msg').textContent='Not enough coins!';document.getElementById('shop-msg').style.color='#e53935';return;}if(item.type==='hat'&&inv.hats.includes(id))return;coinBal-=item.price;if(item.type==='hat')inv.hats.push(id);else if(id==='booster')inv.boosters++;else if(id==='food')inv.food++;document.getElementById('shop-msg').textContent=`Bought ${item.name}!`;document.getElementById('shop-msg').style.color='#4caf50';saveCoins();saveInv();updTopBar();updUse();renderShop();drawAvatar();drawAll();};
window.toggleEquip=function(id){inv.equippedHat=inv.equippedHat===id?null:id;saveInv();updTopBar();renderShop();drawAvatar();drawAll();};

function toggleShop(){const p=document.getElementById('shop-panel');p.style.display=p.style.display==='none'||!p.style.display?'block':'none';renderShop();}
function doUseBoost(){if(inv.boosters>0&&boostLeft===0){inv.boosters--;boostLeft=10;saveInv();updUse();drawAll();C.focus();}}
function doUseFood(){if(inv.food>0&&Date.now()>=frozenUntil){if(!ld.feat.includes('octopus')){setStatus('No enemies to freeze here!');return;}inv.food--;frozenUntil=Date.now()+6000;saveInv();updUse();drawAll();C.focus();}}

// ── Event listeners ──
document.getElementById('shop-btn').addEventListener('click',toggleShop);
document.getElementById('m-shop-btn').addEventListener('click',toggleShop);
document.getElementById('close-shop').addEventListener('click',()=>document.getElementById('shop-panel').style.display='none');
document.getElementById('restart-btn').addEventListener('click',()=>{setupLevel();C.focus();});
document.getElementById('m-restart-btn').addEventListener('click',()=>{setupLevel();C.focus();});
document.getElementById('use-boost').addEventListener('click',doUseBoost);
document.getElementById('use-food').addEventListener('click',doUseFood);
document.getElementById('m-use-boost').addEventListener('click',doUseBoost);
document.getElementById('m-use-food').addEventListener('click',doUseFood);
document.getElementById('level-jump').addEventListener('change',e=>{cur=parseInt(e.target.value);setupLevel();C.focus();});
document.getElementById('m-level-jump').addEventListener('change',e=>{cur=parseInt(e.target.value);setupLevel();});
document.getElementById('next-btn').addEventListener('click',()=>{cur++;setupLevel();C.focus();});
document.getElementById('home-btn').addEventListener('click',()=>{cur=0;setupLevel();C.focus();});
document.getElementById('reset-btn').addEventListener('click',()=>{if(!confirm('Reset all progress, coins and inventory?'))return;hi=0;coinBal=0;inv={hats:[],boosters:0,food:0,equippedHat:null};lsSet(LSP,0);lsSet(LSC,0);lsSet(LSI,inv);cur=0;refreshSel();updTopBar();updUse();renderShop();setupLevel();});

// Keyboard
C.addEventListener('keydown',e=>{
  const map={ArrowRight:[1,0],ArrowLeft:[-1,0],ArrowDown:[0,1],ArrowUp:[0,-1]};
  if(e.key===' '){e.preventDefault();doSpace();return;}
  if(map[e.key]){e.preventDefault();if(teleMode){doTeleport(...map[e.key]);}else{doMoveWithEffects(...map[e.key]);}}
});

// D-pad touch controls
function setupDpad(){
  const dirs={
    'dpad-up':  [0,-1], 'dpad-down': [0,1],
    'dpad-left':[-1,0], 'dpad-right':[1,0]
  };
  let holdTimer=null;
  Object.entries(dirs).forEach(([id,[dc,dr]])=>{
    const btn=document.getElementById(id);
    if(!btn)return;
    const fire=()=>{if(teleMode)doTeleport(dc,dr);else doMoveWithEffects(dc,dr);};
    btn.addEventListener('touchstart',e=>{e.preventDefault();fire();holdTimer=setInterval(fire,180);},{passive:false});
    btn.addEventListener('touchend',()=>{clearInterval(holdTimer);holdTimer=null;});
    btn.addEventListener('touchcancel',()=>{clearInterval(holdTimer);holdTimer=null;});
    btn.addEventListener('click',fire);
  });
  document.getElementById('dpad-space').addEventListener('touchstart',e=>{e.preventDefault();doSpace();},{passive:false});
  document.getElementById('dpad-space').addEventListener('click',doSpace);
}
setupDpad();

// Animation loop
setInterval(()=>{
  const needs=(ld.feat&&(ld.feat.includes('octopus')||ld.feat.includes('underwater')))||boostLeft>0||Date.now()<frozenUntil||inv.equippedHat==='obsidian'||teleMode;
  if(needs&&!won&&!ld.caught){drawAll();updUse();}
},200);

// ── Init ──
updTopBar();refreshSel();setupLevel();renderShop();C.focus();

} // end initGame()
</script>
